<div class="carousel-container">
  <div
    class="carousel-slide"
    *ngFor="let slide of slides; let i = index"
    [class.active]="i === currentSlide"
  >
    <img [src]="slide.image" [alt]="slide.title" [attr.fetchpriority]="i === 0 ? 'high' : null" [attr.loading]="i === 0 ? 'eager' : 'lazy'" class="carousel-image">
    <div class="overlay"></div>
    <div class="content">
      <h2>{{ slide.title }}</h2>
      <p>{{ slide.description }}</p>
    </div>
  </div>

  <!-- Dots Navigation -->
  <div class="carousel-dots">
    <span
      *ngFor="let slide of slides; let i = index"
      class="dot"
      [class.active]="i === currentSlide"
      (click)="goToSlide(i)"
    ></span>
  </div>
</div>
